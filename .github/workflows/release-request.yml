name: Release request

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing immutable SemVer tag to release (for example 1.2.3)
        required: true
        type: string

permissions:
  contents: read

jobs:
  request:
    name: validate release reference
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          # The validation step below fetches and ls-remotes the origin, which
          # needs the (contents: read) token when the repository is private.
          # The checkout post-action removes the persisted credential.
          persist-credentials: true
      - name: Resolve protected tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          semver='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'
          [[ "$TAG" =~ $semver ]] || { echo "tag is not canonical SemVer: $TAG" >&2; exit 1; }
          prerelease=${BASH_REMATCH[5]:-}
          if [[ -n "$prerelease" ]]; then
            IFS=. read -ra identifiers <<< "$prerelease"
            for identifier in "${identifiers[@]}"; do
              if [[ "$identifier" =~ ^[0-9]+$ && ${#identifier} -gt 1 && "$identifier" == 0* ]]; then
                echo "numeric prerelease identifiers cannot have leading zeroes: $TAG" >&2
                exit 1
              fi
            done
          fi
          git check-ref-format "refs/tags/$TAG"
          git fetch --force --tags origin refs/heads/main:refs/remotes/origin/main
          ref_oid=$(git rev-parse "refs/tags/$TAG")
          commit_oid=$(git rev-parse "refs/tags/$TAG^{commit}")
          git merge-base --is-ancestor "$commit_oid" refs/remotes/origin/main || {
            echo "tag $TAG does not point into protected main" >&2
            exit 1
          }
          remote_ref=$(git ls-remote --refs origin "refs/tags/$TAG" | awk 'NR == 1 { print $1 }')
          [[ -n "$remote_ref" && "$remote_ref" == "$ref_oid" ]] || {
            echo "tag $TAG changed while the request was being validated" >&2
            exit 1
          }
          printf '%s\n%s\n%s\n' "$TAG" "$ref_oid" "$commit_oid" > release-request.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-request
          path: release-request.txt
          if-no-files-found: error
          overwrite: true
          retention-days: 30
