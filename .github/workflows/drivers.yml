# Native drivers CI: every Prukka virtual device compiles on its own OS
# with the platform's native toolchain alone — Command Line Tools clang on
# macOS (plus the contract harness), the kernel's kbuild on Linux, MSVC on
# Windows. No third-party build tools.
name: drivers

on:
  push:
    paths: ["drivers/**", ".github/workflows/drivers.yml"]
  pull_request:
    paths: ["drivers/**", ".github/workflows/drivers.yml"]
  # Force-pushed rewrites defeat path filtering (no computable diff), so
  # the matrix must be startable by hand.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos:
    name: macOS (HAL audio ×2 + camera extension)
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Microphone (build + contract harness)
        run: drivers/macos/microphone/build.sh
      - name: Speaker (build + contract harness)
        run: drivers/macos/audio/build.sh
      - name: Webcam (build + bundle gate)
        run: drivers/macos/webcam/build.sh

  linux:
    name: Linux (ALSA loopback ×2 + V4L2 webcam)
    # The modules build against the generic-flavor headers — the kernel
    # users actually run. The runner's own azure-flavor kernel carries no
    # sound/media exports, so it cannot host this build.
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Kernel headers (generic flavor)
        run: |
          sudo apt-get update && sudo apt-get install -y linux-headers-generic
          KDIR="$(find /usr/src -maxdepth 1 -type d -name 'linux-headers-*-generic' | sort -V | tail -n 1)"
          test -n "$KDIR" && echo "KDIR=$KDIR" >> "$GITHUB_ENV"
      - name: Microphone module
        run: make -C drivers/linux/microphone KDIR="$KDIR" KCFLAGS=-Werror
      - name: Speaker module
        run: make -C drivers/linux/audio KDIR="$KDIR" KCFLAGS=-Werror
      - name: Webcam module
        run: make -C drivers/linux/webcam KDIR="$KDIR" KCFLAGS=-Werror

  windows:
    name: Windows (MF camera + PortCls audio ×2)
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Webcam (MSVC, user mode — no WDK)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          drivers\windows\webcam\build.cmd
      - name: Audio core models (MSVC /W4 /WX)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /nologo /std:c++14 /permissive- /W4 /WX /EHsc drivers\windows\common\ring_test.cpp /Fo"%TEMP%\prukka_ring_test.obj" /Fe"%TEMP%\prukka_ring_test.exe" || exit /b 1
          "%TEMP%\prukka_ring_test.exe" || exit /b 1
          cl /nologo /std:c++14 /permissive- /W4 /WX /EHsc drivers\windows\common\position_test.cpp /Fo"%TEMP%\prukka_position_test.obj" /Fe"%TEMP%\prukka_position_test.exe" || exit /b 1
          "%TEMP%\prukka_position_test.exe" || exit /b 1
      # The PortCls audio pair is kernel-mode: the WindowsKernelModeDriver10.0
      # toolset comes from the Windows Driver Kit installed alongside the
      # runner's Visual Studio. Loading the built driver additionally
      # requires attestation signing (see drivers/windows/README.md).
      - name: Microphone + Speaker (msbuild)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          for %%p in (microphone\prukka_mic audio\prukka_speaker) do (
            msbuild drivers\windows\%%p.vcxproj -p:Configuration=Release -p:Platform=x64 || exit /b 1
          )
      - name: Audio driver package isolation (InfVerif /w)
        shell: pwsh
        run: |
          $tool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\Tools" -Filter InfVerif.exe -Recurse |
            Where-Object FullName -Match '\\x64\\' |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $tool) { throw "InfVerif.exe not found in the installed WDK" }
          & $tool.FullName /w /v drivers\windows\microphone\prukka_mic.inf drivers\windows\audio\prukka_speaker.inf
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
