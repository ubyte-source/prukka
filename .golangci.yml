# golangci-lint
# Tested configuration that shows ALL problems

version: "2"

run:
  timeout: 30m
  tests: true
  go: "1.26"

linters:
  default: none
  disable: []
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gosec
    - gocyclo
    - gocognit
    - cyclop
    - funlen
    - nestif
    - lll
    - dupl
    - goconst
    - thelper
    - gocritic
    - misspell
    - durationcheck
    - nilerr
    - errorlint
    - bodyclose
    - prealloc
    - forbidigo
    - gomoddirectives
    - gomodguard_v2
    - nolintlint
    - copyloopvar
    - intrange
    - unconvert
    - unparam
    - wastedassign
    - exhaustive
    - noctx
    - perfsprint
    - usestdlibvars
    - sloglint
    - protogetter
    - makezero
    - predeclared
    - reassign
    - errname
    - nilnil
    - nilnesserr
    - asasalint
    - bidichk
    - errchkjson
    - gocheckcompilerdirectives
    - goprintffuncname
    - interfacebloat
    - loggercheck
    - musttag
    - promlinter
    - mirror
    - exptostd
    - dogsled
    - embeddedstructfieldcheck
    - iface
    - recvcheck
    - fatcontext
    - inamedparam
    - usetesting
    - testableexamples
    - gochecknoinits
    - nosprintfhostport
    - tparallel
  exclusions:
    presets: []
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - goconst
      # Reviewed execution boundary: resolved binaries receive validated,
      # tokenized arguments; no shell is involved.
      - path: ^internal/media/ffmpeg/(devices|supervisor)\.go$
        linters:
          - gosec
        text: "G204"
      # The bundled speech engine is spawned from an installer-resolved path
      # with tokenized arguments; no shell is involved.
      - path: ^internal/providers/native/(stt|tts|mt)\.go$
        linters:
          - gosec
        text: "G204|G702"
      # The runtime-error walker inspects each graph node directly: errors.As
      # would descend and re-select the first joined child, and errors.Unwrap
      # ignores the []error shape. The type switches are the intended traversal.
      - path: ^internal/core/session/status\.go$
        linters:
          - errorlint
      # Process-tree tests re-execute only the current test binary with fixed
      # arguments; no operator-controlled command reaches this boundary.
      - path: ^internal/providers/native/(helpers|process_tree)_test\.go$
        linters:
          - gosec
        text: "G204|G702"
      # SetInformationJobObject requires a pointer to the exact Win32
      # JOBOBJECT_EXTENDED_LIMIT_INFORMATION layout owned for the call.
      - path: ^internal/providers/native/process_tree_windows\.go$
        linters:
          - gosec
        text: "G103"
      # PCM byte conversion preserves the exact signed 16-bit bit pattern;
      # same-width signed/unsigned casts are the codec operation itself.
      - path: ^internal/core/pipeline/pcm\.go$
        linters:
          - gosec
        text: "G115"
      # Managed executables must be owner-executable.
      - path: ^internal/media/ffmpeg/(install|replace)\.go$
        linters:
          - gosec
        text: "G302"
      - path: ^internal/media/ffmpeg/install_test\.go$
        linters:
          - gosec
        text: "G306"
      # The process failure test re-executes its own trusted test binary
      # with one constant argument to exercise os.Process.Wait portably.
      - path: ^internal/media/ffmpeg/process_internal_test\.go$
        linters:
          - gosec
        text: "G204|G702"
      # SetFileInformationByHandle takes a byte pointer to the exact Win32
      # FILE_DISPOSITION_INFORMATION_EX layout.
      - path: ^internal/media/ffmpeg/replace_windows\.go$
        linters:
          - gosec
        text: "G103"
      # Driver archives are embedded release assets. Extraction validates
      # relative paths before creating world-readable driver files.
      - path: ^internal/devices/archive\.go$
        linters:
          - gosec
        text: "G301|G304"
      - path: ^internal/devices/devices\.go$
        linters:
          - gosec
        text: "G204|G301"
      - path: ^internal/devices/dirs_(unix|windows)\.go$
        linters:
          - gosec
        text: "G301"
      # Linux module directories and metadata must be system-readable;
      # kernelRelease validates uname output before it enters a path.
      - path: ^internal/devices/install_linux\.go$
        linters:
          - gosec
        text: "G301|G306|G703"
      - path: ^internal/devices/marker\.go$
        linters:
          - gosec
        text: "G306"
      # Service targets are generated locally and passed directly to the OS
      # service manager without a shell.
      - path: ^internal/control/service/service_(darwin|windows)\.go$
        linters:
          - gosec
        text: "G204"
      # Lifecycle tests execute only test-owned shell scripts. Owner execute
      # permissions and variable temporary paths are intrinsic to the test.
      - path: ^deploy/install(_windows)?_test\.go$
        linters:
          - gosec
        text: "G204|G302"
      # yaml.Marshaler fixes MarshalYAML's (any, error) shape; the error
      # result staying nil is the interface's contract, not dead code.
      - path: ^internal/core/config/config\.go$
        text: "MarshalYAML"
        linters:
          - unparam
  settings:
    # ERRCHECK - check ALL errors
    errcheck:
      check-type-assertions: true
      check-blank: true

    # GOSEC - maximum security
    gosec:
      severity: low
      confidence: low

    # GOVET - all checks
    govet:
      enable-all: true

    # STATICCHECK
    staticcheck:
      checks: ["all"]

    # REVIVE - working configuration
    revive:
      severity: warning
      rules:
        - name: exported
          severity: warning
        - name: var-naming
          severity: warning
        - name: package-comments
          severity: warning
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: bool-literal-in-expr
        - name: constant-logical-expr

    # GOCYCLO - reasonable complexity threshold
    gocyclo:
      min-complexity: 15

    # GOCOGNIT - cognitive complexity
    gocognit:
      min-complexity: 20

    # FUNLEN - reasonable function length
    funlen:
      lines: 65
      statements: 40

    # GOCONST - find constants
    goconst:
      min-len: 2
      min-occurrences: 4

    # RECVCHECK - yaml.Unmarshaler forces a pointer receiver next to the
    # value receivers the rest of the type wants; that pairing is the
    # library's contract, not an inconsistency.
    recvcheck:
      disable-builtin: true
      exclusions:
        - "Duration.MarshalYAML"
        - "Duration.UnmarshalYAML"

    # USETESTING - os.MkdirTemp stays allowed: UNIX socket paths must fit
    # sun_path (104 bytes on macOS) and t.TempDir() nests too deep.
    usetesting:
      os-mkdir-temp: false

    # GOCRITIC - enable all checks
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - experimental
        - opinionated

    lll:
      line-length: 120

    misspell:
      locale: US

    prealloc:
      simple: true
      range-loops: true
      for-loops: true

    dupl:
      threshold: 150

    # EXHAUSTIVE - an explicit default arm is a decision: switches over
    # foreign enums document what they refuse instead of naming every
    # irrelevant value.
    exhaustive:
      default-signifies-exhaustive: true

    # NOLINTLINT
    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

    # UNPARAM
    unparam:
      check-exported: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/

issues:
  # No limits
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text: {}
  sort-order:
    - linter
    - file
  show-stats: true
